services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${CRM_PORTAL_TS_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: 8080
      CRM_PORTAL_TS_DB_PATH: /app/runtime/crm-portal-ts.sqlite
      CRM_PORTAL_TS_UPLOAD_ROOT: /app/runtime/uploads
      CRM_PORTAL_TS_BACKUP_ROOT: /app/runtime/backups
    volumes:
      - backend-runtime:/app/runtime
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${CRM_PORTAL_TS_BACKEND_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/health/ready').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      NUXT_API_BASE: http://backend:8080
      NUXT_PUBLIC_API_BASE: /api/v1
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${CRM_PORTAL_TS_PROXY_PORT:-80}:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/health/live >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  backend-runtime:
