
{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <h2 class="text-2xl font-black text-white">{{ title }}</h2>
        <a href="/vehicles-cli" class="text-xs text-slate-500 hover:text-white transition-colors">
            <i class="fas fa-arrow-left mr-1"></i> Powrót do listy
        </a>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <form action="{{ '/'+'vehicles-cli'+'/'+item.id|string+'/edit' if item else '/'+'vehicles-cli'+'/new' }}" method="post" class="space-y-6">
            
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">Marka</label>
                <input type="text" name="brand" value="{{ item.brand if item else "" }}" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">Model</label>
                <input type="text" name="model" value="{{ item.model if item else "" }}" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">Numer rejestracyjny</label>
                <input type="text" name="plate" value="{{ item.plate if item else "" }}" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">DostĂ„â„˘pny</label>
                
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="is_available" {{ 'checked' if item and item.is_available else '' }} class="rounded border-white/10 bg-white/5 text-primary focus:ring-primary">
                    <span class="text-xs text-slate-400">Aktywne / Tak</span>
                </div>
            </div>

            <div class="pt-6 border-t border-white/5">
                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-primary-foreground font-black py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    {{ 'Zapisz zmiany' if item else 'Utwórz rekord' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
