
{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-8">
    <div class="flex items-center justify-between">
        <h2 class="text-2xl font-black text-white">{{ title }}</h2>
        <a href="/office-equipment" class="text-xs text-slate-500 hover:text-white transition-colors">
            <i class="fas fa-arrow-left mr-1"></i> Powrót do listy
        </a>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <form action="{{ '/'+'office-equipment'+'/'+item.id|string+'/edit' if item else '/'+'office-equipment'+'/new' }}" method="post" class="space-y-6">
            
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">Nazwa przedmiotu</label>
                <input type="text" name="item_name" value="{{ item.item_name if item else "" }}" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">Numer seryjny</label>
                <input type="text" name="serial_number" value="{{ item.serial_number if item else "" }}" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2 px-1">IloĹ›Ä‡</label>
                <input type="number" name="quantity" value="{{ item.quantity if item else "" }}" class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-primary">
            </div>

            <div class="pt-6 border-t border-white/5">
                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-primary-foreground font-black py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    {{ 'Zapisz zmiany' if item else 'Utwórz rekord' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
