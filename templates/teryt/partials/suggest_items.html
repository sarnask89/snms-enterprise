{% for item in items %}
<div class="suggest-item p-2 cursor-pointer hover:bg-accent hover:text-accent-foreground border-b border-border/50 last:border-0" 
     onclick="selectSuggestion(this, '{{ item.text }}', '{{ item.id or '' }}', '{{ item.type }}')">
     <div class="flex justify-between items-center">
        <span>{{ item.text }}</span>
        <span class="text-[9px] uppercase tracking-widest text-muted-foreground">{{ item.type }}</span>
     </div>
</div>
{% endfor %}

<script>
window.selectSuggestion = function(el, text, id, type) {
        console.log("selectSuggestion called:", {text, id, type});
        const container = el.closest('.teryt-lookup-container') || el.closest('.space-y-2');
        const parentDiv = el.closest('.space-y-2');
        
        // 1. Update text input
        if (container) {
            const textInput = container.querySelector('input[type=text]');
            if (textInput) {
                textInput.value = text;
                textInput.dispatchEvent(new Event('input', { bubbles: true }));
                textInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            
            // 2. Update hidden ID input
            let hiddenId = container.querySelector('input[type=hidden]');
            if (!hiddenId && parentDiv) {
                hiddenId = parentDiv.querySelector('input[type=hidden]');
            }
            
            // Fallback for Net Nodes specifically
            if (!hiddenId && type === 'street') {
                hiddenId = document.getElementById('location_street_id');
            } else if (!hiddenId && type === 'city') {
                hiddenId = document.getElementById('location_city_id');
            }

            if (hiddenId) {
                console.log("Updating hidden input:", hiddenId.id, "with value:", id);
                hiddenId.value = id;
                hiddenId.dispatchEvent(new Event('change', { bubbles: true }));
            }
        }
        
        // 3. Dispatch global event (CRITICAL FOR GEOCODING)
        window.dispatchEvent(new CustomEvent('suggestion-selected', { detail: { text, id, type } }));

        // 4. Clear suggestions
        const box = el.closest('.suggest-results-box');
        if (box) box.innerHTML = '';
    }
</script>
