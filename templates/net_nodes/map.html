{% extends "base.html" %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-200px)] gap-4">
    <div class="bg-card p-4 rounded-xl border shadow-sm flex items-center justify-between">
        <div>
            <h3 class="font-bold">Wizualizacja infrastruktury</h3>
            <p class="text-xs text-muted-foreground">Podgląd węzłów i relacji transmisyjnych na mapie.</p>
        </div>
        <div class="flex gap-4 text-[10px] font-bold uppercase">
            <div class="flex items-center gap-1"><span class="w-3 h-1 bg-blue-500 rounded"></span> Światłowód</div>
            <div class="flex items-center gap-1"><span class="w-3 h-1 bg-rose-500 rounded"></span> Radio</div>
            <div class="flex items-center gap-1"><span class="w-3 h-1 bg-amber-500 rounded"></span> Miedź</div>
        </div>
    </div>

    <div id="topo-map" class="flex-1 rounded-xl border shadow-lg z-0"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const map = L.map('topo-map').setView([52.231, 21.012], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const nodes = {{ nodes | tojson | safe if nodes else '[]' }};
    const links = {{ links | tojson | safe if links else '[]' }};
    const bounds = [];

    // Rysowanie węzłów
    nodes.forEach(n => {
        if (n.latitude && n.longitude) {
            const marker = L.marker([n.latitude, n.longitude]).addTo(map);
            marker.bindPopup(`<b>${n.name}</b><br><span class="text-[10px] uppercase">${n.node_type || 'Inny'}</span><br><a href="/net-nodes/${n.id}/edit" class="text-primary font-bold">Edytuj</a>`);
            bounds.push([n.latitude, n.longitude]);
        }
    });

    // Rysowanie połączeń
    links.forEach(l => {
        const s = nodes.find(n => n.id === l.source_node_id);
        const t = nodes.find(n => n.id === l.target_node_id);
        if (s && t && s.latitude && t.latitude) {
            let color = '#3b82f6'; // Fiber
            if (l.medium_type === 'Radio') color = '#f43f5e';
            if (l.medium_type === 'Copper') color = '#f59e0b';

            L.polyline([[s.latitude, s.longitude], [t.latitude, t.longitude]], {
                color: color,
                weight: 3,
                opacity: 0.7,
                dashArray: l.medium_type === 'Radio' ? '5, 10' : ''
            }).addTo(map).bindPopup(`Link: ${s.name} ↔ ${t.name}<br>Medium: ${l.medium_type}<br>Cap: ${l.capacity_mbps || '—'} Mbps`);
        }
    });

    if (bounds.length > 0) {
        map.fitBounds(bounds);
    }
});
</script>
{% endblock %}
