{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="bg-amber-100 p-4 rounded-full mb-6">
        <i class="fas fa-database text-amber-600 text-5xl"></i>
    </div>
    <h1 class="text-3xl font-extrabold tracking-tight sm:text-4xl mb-2">Błąd bazy danych</h1>
    <p class="text-muted-foreground max-w-md mb-4">
        Nie udało się wykonać operacji na bazie danych.
    </p>
    {% if detail %}
    <div class="bg-muted p-4 rounded-md text-left mb-8 max-w-2xl overflow-auto">
        <code class="text-xs text-muted-foreground">{{ detail }}</code>
    </div>
    {% endif %}
    <a href="/" class="inline-flex items-center justify-center rounded-md text-sm font-bold bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 shadow transition-colors">
        Wróć do pulpitu
    </a>
</div>
{% endblock %}
