{% extends "base.html" %}
{% block content %}
<form method="post" action="{{ '/admin/user-groups/' ~ group.id ~ '/edit' if group else '/admin/user-groups/new' }}" style="max-width:36rem;">
  <label>Nazwa <input name="name" required maxlength="128" value="{{ group.name if group else '' }}"></label>
  <label>Opis <textarea name="description" rows="2" style="width:100%;">{{ group.description if group and group.description else '' }}</textarea></label>
  <fieldset style="margin-top:1rem;">
    <legend>Członkowie</legend>
    <div class="row" style="flex-direction:column;gap:0.25rem;max-height:20rem;overflow:auto;">
      {% for u in all_users %}
      <label><input type="checkbox" name="user_id" value="{{ u.id }}" {% if u.id in selected_ids %}checked{% endif %}> {{ u.username }} ({{ u.role.value }})</label>
      {% endfor %}
    </div>
  </fieldset>
  <p style="margin-top:1rem;"><button type="submit">Zapisz</button> <a href="/admin/user-groups">Anuluj</a></p>
</form>
{% endblock %}
