<div class="space-y-4 animate-in slide-in-from-top-4 duration-300">
    {% if neighbors %}
    <div class="overflow-x-auto rounded-lg border">
        <table class="w-full text-sm text-left">
            <thead class="bg-muted/50 text-[10px] font-bold uppercase tracking-widest text-muted-foreground">
                <tr>
                    <th class="px-4 py-2">Tożsamość / IP</th>
                    <th class="px-4 py-2">Port Lokalny</th>
                    <th class="px-4 py-2">Platforma</th>
                    <th class="px-4 py-2 text-right">Akcje</th>
                </tr>
            </thead>
            <tbody class="divide-y">
                {% for n in neighbors %}
                <tr class="hover:bg-muted/30 transition-colors">
                    <td class="px-4 py-3">
                        <div class="font-bold">{{ n.identity or 'Nieznany' }}</div>
                        <div class="text-[10px] text-muted-foreground font-mono">{{ n.ip or 'brak IP' }}</div>
                    </td>
                    <td class="px-4 py-3 text-xs">{{ n.interface }}</td>
                    <td class="px-4 py-3 text-[10px] font-medium text-muted-foreground">{{ n.platform }}</td>
                    <td class="px-4 py-3 text-right">
                        <button class="text-primary hover:underline text-[10px] font-bold uppercase">Podłącz</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="text-center py-12 text-muted-foreground italic text-sm">
        Brak wykrytych sąsiadów na tym urządzeniu. Upewnij się, że LLDP/MNDP jest włączone.
    </div>
    {% endif %}
</div>
