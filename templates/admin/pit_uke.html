{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold tracking-tight">Raportowanie regulatoryjne (PIT UKE)</h1>
  </div>

  <div class="grid gap-6 md:grid-cols-2">
    <div class="rounded-xl border bg-card text-card-foreground shadow">
      <div class="p-6">
        <h3 class="text-lg font-semibold leading-none tracking-tight mb-4">Eksport danych</h3>
        <p class="text-sm text-muted-foreground mb-6">
          Generuj plik zgodny z wymaganiami inwentaryzacji UKE. System wyeksportuje dane o infrastrukturze i zasięgach.
        </p>
        
        <div class="space-y-4">
          <div class="flex items-center justify-between p-3 rounded-lg bg-muted/50 border">
            <span class="text-sm font-medium">Liczba punktów adresowych:</span>
            <span class="text-sm font-bold">{{ nodes_count }}</span>
          </div>
          
          <a href="/admin/pit/export" class="inline-flex items-center justify-center w-full h-10 px-4 py-2 bg-primary text-primary-foreground hover:bg-primary/90 rounded-md font-medium transition-colors">
            <i class="fas fa-download mr-2"></i> Eksportuj CSV dla UKE
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
