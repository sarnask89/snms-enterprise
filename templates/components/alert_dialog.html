{% macro alert_dialog(id, title, description, action_label="Continue", action_method="POST") %}
<div x-data="{ open: false, url: '', name: '' }" 
     @open-alert-{{ id }}.window="open = true; url = $event.detail.url; name = $event.detail.name || ''"
     x-show="open" 
     class="fixed inset-0 z-50 bg-background/80 backdrop-blur-sm animate-in fade-in-0"
     style="display: none;"
     x-cloak>
    <div class="fixed left-[50%] top-[50%] z-50 grid w-full max-w-lg translate-x-[-50%] translate-y-[-50%] gap-4 border bg-background p-6 shadow-lg duration-200 animate-in fade-in-0 zoom-in-95 sm:rounded-lg">
        <div class="flex flex-col space-y-2 text-center sm:text-left">
            <h2 class="text-lg font-semibold">{{ title }}</h2>
            <p class="text-sm text-muted-foreground">
                {{ description }} <span class="font-bold text-foreground" x-text="name"></span>?
            </p>
        </div>
        <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2">
            <button @click="open = false" 
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2">
                Anuluj
            </button>
            <form :action="url" method="{{ action_method }}">
                <button type="submit" 
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-destructive text-destructive-foreground hover:bg-destructive/90 h-10 px-4 py-2">
                    {{ action_label }}
                </button>
            </form>
        </div>
    </div>
</div>
{% endmacro %}
