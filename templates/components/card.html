{% macro card(title=None, subtitle=None, footer=None, class="") %}
<div class="rounded-xl border bg-card text-card-foreground shadow {{ class }}">
    {% if title or subtitle %}
    <div class="flex flex-col space-y-1.5 p-6">
        {% if title %}<h3 class="font-semibold leading-none tracking-tight text-xl">{{ title }}</h3>{% endif %}
        {% if subtitle %}<p class="text-sm text-muted-foreground">{{ subtitle }}</p>{% endif %}
    </div>
    {% endif %}
    <div class="p-6 pt-0">
        {{ caller() }}
    </div>
    {% if footer %}
    <div class="flex items-center p-6 pt-0">
        {{ footer }}
    </div>
    {% endif %}
</div>
{% endmacro %}
