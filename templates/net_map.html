{% extends "base.html" %}

{% block content %}
<div class="h-[calc(100vh-120px)] flex flex-col gap-4">
  <div class="flex items-center justify-between shrink-0">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Mapa Sieci i Paszportyzacja</h1>
      <p class="text-xs text-muted-foreground">Podkład Geoportal (WMS) + Infrastruktura SNMS</p>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleNodes()" class="h-8 px-3 py-1 text-[10px] font-bold border rounded bg-background hover:bg-accent transition-colors">
        <i class="fas fa-layer-group mr-1"></i> Przełącz węzły
      </button>
    </div>
  </div>

  <div class="flex-1 rounded-xl border bg-card shadow-lg overflow-hidden relative">
    <div id="map" class="absolute inset-0 z-10"></div>
    
    <!-- Map Legend / Controls Overlay -->
    <div class="absolute bottom-4 left-4 z-20 bg-background/90 backdrop-blur border rounded-lg p-3 shadow-xl max-w-xs">
      <div class="text-[10px] font-bold uppercase tracking-widest text-muted-foreground mb-2">Legenda</div>
      <div class="space-y-2">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div>
          <span class="text-[10px] font-medium">Węzeł dystrybucyjny</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
          <span class="text-[10px] font-medium">Punkt abonencki</span>
        </div>
        <div class="pt-2 mt-2 border-t border-white/10">
          <div class="text-[9px] text-muted-foreground">Warstwa: Geoportal Krajowy (Cieniowanie + Kataster)</div>
        </div>
      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 1. Initialize Map (Center of Poland or from settings)
    const map = L.map('map').setView([52.2, 19.4], 6);

    // 2. Base Layers
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    });

    // 3. Geoportal WMS Layers (The WOW factor)
    const geoportalOrto = L.tileLayer.wms("https://mapy.geoportal.gov.pl/wss/service/PZGIK/ORTO/WMS/StandardResolution", {
      layers: 'Raster',
      format: 'image/png',
      transparent: true,
      attribution: "© Geoportal.gov.pl"
    });

    const geoportalKataster = L.tileLayer.wms("https://integracja.gugik.gov.pl/cgi-bin/KrajowaIntegracjaEwidencjiGruntow", {
      layers: 'dzialki,numery_dzialek,budynki',
      format: 'image/png',
      transparent: true,
      attribution: "© GUGiK (KIEG)"
    }).addTo(map); // Default active

    osm.addTo(map);

    // 4. Layer Control
    const baseMaps = {
      "OpenStreetMap": osm,
      "Geoportal Ortofoto": geoportalOrto
    };
    
    const overlayMaps = {
      "Kataster (Działki/Budynki)": geoportalKataster
    };
    
    L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);

    // 5. Add SNMS Infrastructure (Placeholder logic)
    const nodes = {{ nodes_json|safe if nodes_json else '[]' }};
    nodes.forEach(node => {
      if (node.lat && node.lon) {
        L.circleMarker([node.lat, node.lon], {
          radius: 6,
          fillColor: node.type === 'net_node' ? '#3b82f6' : '#10b981',
          color: "#fff",
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map).bindPopup(`<b>${node.name}</b><br>${node.address}`);
      }
    });
  });

  function toggleNodes() {
    // Simple toggle logic for nodes
  }
</script>

<style>
  .leaflet-container {
    background: #0f172a !important;
  }
  .leaflet-control-layers {
    background: rgba(15, 23, 42, 0.9) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    color: #fff !important;
    backdrop-filter: blur(10px);
  }
</style>
{% endblock %}
