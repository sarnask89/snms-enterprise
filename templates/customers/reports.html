{% extends "base.html" %}
{% block content %}
<p class="row" style="gap:0.75rem;">
  <a class="btn" href="/customers/reports.csv">Eksport CSV</a>
  <button type="button" class="btn" onclick="window.print()">Drukuj</button>
  <a href="/customers">Lista klientów</a>
</p>
<table class="data">
  <thead><tr><th>Kod</th><th>Imię i nazwisko</th><th>Email</th><th>Status</th></tr></thead>
  <tbody>
    {% for c in customers %}
    <tr>
      <td>{{ c.customer_code }}</td>
      <td>{{ c.first_name }} {{ c.last_name }}</td>
      <td>{{ c.email or "—" }}</td>
      <td>{{ c.status.value }}</td>
    </tr>
    {% else %}
    <tr><td colspan="4">Brak klientów.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
