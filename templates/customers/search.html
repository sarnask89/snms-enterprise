{% extends "base.html" %}
{% block content %}
<p class="muted">Wyszukiwanie zaawansowane klientów.</p>
<form method="get" action="/customers" class="stack narrow">
  <label>Szukaj (fraza)
    <input name="q" value="" placeholder="np. Kowal lub @domena.pl" autofocus>
  </label>
  
  <label>Status
    <select name="status">
      <option value="">— wszystkie —</option>
      {% for s in statuses %}
      <option value="{{ s.value }}">{{ s.value }}</option>
      {% endfor %}
    </select>
  </label>

  <div class="row" style="gap:1rem;">
    <label>Od (data)
      <input type="date" name="date_from">
    </label>
    <label>Do (data)
      <input type="date" name="date_to">
    </label>
  </div>

  <div class="row" style="margin-top:1rem;">
    <button type="submit">Szukaj</button>
    <a href="/customers">Wyczyść / Pełna lista</a>
  </div>
</form>
{% endblock %}
