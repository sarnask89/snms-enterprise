name: crm-portal-ts-release-gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: crm-portal-ts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            crm-portal-ts/package-lock.json
            crm-portal-ts/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run release gate and container smoke
        run: npm run verify:ci
