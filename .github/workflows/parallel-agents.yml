name: Parallel Agent Tasks

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: 'JSON array of tasks to run in parallel. Example: [{"name": "task1", "prompt": "prompt1"}, {"name": "task2", "prompt": "prompt2"}]'
        required: true
        default: '[{"name": "default-task", "prompt": "This is a default task."}]'

jobs:
  dispatch-agent-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: ${{ fromJson(github.event.inputs.tasks) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Gemini Agent for ${{ matrix.task.name }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Starting agent for task: ${{ matrix.task.name }}"
          echo "Prompt: ${{ matrix.task.prompt }}"
          npx @google/gemini-cli --skip-trust invoke-agent generalist --prompt "${{ matrix.task.prompt }}"
          echo "Agent for task ${{ matrix.task.name }} finished."
