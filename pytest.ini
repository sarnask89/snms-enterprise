[pytest]
pythonpath = .
testpaths = tests
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
env =
    AUTH_ENABLED=false

# Strictly ignore everything except the core flows and mandatory verification
addopts = 
    --ignore=tests/new_suite
    --ignore=tests/test_geocoding.py
    --ignore=tests/test_gugik.py
    --ignore=tests/test_hardware_mocking.py
    --ignore=tests/test_hardware_services.py
    --ignore=tests/test_integration_crud.py
    --ignore=tests/test_portal_nav_smoke.py
    --ignore=tests/test_subscriptions_logic.py
    --ignore=tests/test_teryt_search_service_tdd.py
    --ignore=tests/test_stability_fixes.py
    -p no:anyio

markers =
    integration: CRUD / sesja jak w przeglądarce (HTTP POST + redirect)
